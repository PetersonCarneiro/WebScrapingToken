name: Extract EQS Tokens

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 0-6'

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Google Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-chromedriver: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run token extraction
        env:
          EQS_LOGIN: ${{ secrets.EQS_LOGIN }}
          EQS_PASSWORD: ${{ secrets.EQS_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          CHROME_BINARY: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: python src/extract_eqs_tokens.py

      - name: Upload generated files
        uses: actions/upload-artifact@v4
        with:
          name: eqs-tokens
          path: output/
